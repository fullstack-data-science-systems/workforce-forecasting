<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employment Rate Forecaster API</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="app.js" defer></script>
</head>

<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <div class="glow-sphere"></div>
                <h1>Employment Forecaster</h1>
            </div>
            <div id="status-indicator" class="status-indicator loading">
                <span class="status-dot"></span>
                <span class="status-text">Connecting to API...</span>
            </div>
        </header>

        <main>
            <aside class="sidebar glass-panel">
                <h2>Controls</h2>
                <form id="forecast-form">
                    <div class="form-group">
                        <label for="model-select">Forecast Model</label>
                        <select id="model-select" required>
                            <option value="" disabled selected>Loading models...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="province-select">Province (Optional)</label>
                        <select id="province-select">
                            <option value="">All Provinces (Canada)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="steps-input">Horizon (Months)</label>
                        <div class="range-container">
                            <input type="range" id="steps-input" min="1" max="60" value="12"
                                oninput="this.nextElementSibling.value = this.value">
                            <output>12</output>
                        </div>
                    </div>

                    <button type="submit" id="forecast-btn" class="btn-primary" disabled>
                        <span>Generate Forecast</span>
                        <div class="loader-spinner"></div>
                    </button>
                </form>

                <div class="model-info glass-panel-inner" id="model-details" style="display: none;">
                    <h3>Model Details</h3>
                    <p id="details-text"></p>
                </div>
            </aside>

            <section class="content-area">
                <div class="chart-container glass-panel">
                    <div id="welcome-message" class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        <h2>Ready to Predict the Future?</h2>
                        <p>Select a model and adjust parameters to generate an employment rate forecast for Canada.</p>
                    </div>
                    <canvas id="forecastChart" style="display: none;"></canvas>
                </div>

                <div class="data-table-container glass-panel" style="display: none;">
                    <div class="table-header">
                        <h2>Forecast Data Explorer</h2>
                        <button id="download-csv-btn" class="btn-secondary">Download CSV</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="data-table">
                            <thead>
                                <tr id="table-head-row"></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
